<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YOMI EL BOOMI</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
      font-family: 'Arial Black', sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 4rem;
      color: #fff;
      letter-spacing: 10px;
      position: relative;
      animation: glow 2s ease-in-out infinite alternate;
    }

    h1::before {
      content: "KURPEN EL NOOBI";
      position: absolute;
      left: 0;
      top: 0;
      z-index: -1;
      color: #00f7ff;
      filter: blur(15px);
      opacity: 0.7;
      animation: pulse 3s infinite;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff;
      }
      to {
        text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
      }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1>YOMI EL BOOMI</h1>
</body>
</html>
